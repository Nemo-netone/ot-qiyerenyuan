server:
  port: ${SERVER_PORT:8888}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hrm?currentSchema=hrm_qiyerenyuan}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      schema: ${DB_SCHEMA:hrm_qiyerenyuan}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}

  mvc:
    pathmatch:
      matching-strategy: ant-path-matcher

mybatis-plus:
  configuration:
    log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.nologging.NoLoggingImpl}
  type-enums-package: com.qiujie.enums

file:
  upload:
    path: ${FILE_UPLOAD_PATH:/tmp/hrm-files/}
